name: autofix.ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: install-pinned/ruff@4c7f3972b97e54b86fddc4b03463875702479209
      - run: ruff --fix-only .
      - run: ruff format .

      - name: Run prettier
        run: |
          npm ci
          npm run prettier
        working-directory: web

      - uses: mhils/add-pr-ref-in-changelog@main

      - uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27
